<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacoin · 隐私币演示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Noto Sans SC,sans-serif;background:#f5f0e8;color:#2c2c2c;padding:1rem;min-height:100vh}
.container{max-width:960px;margin:0 auto}
h1{text-align:center;font-size:1.8rem;margin-bottom:.3rem;letter-spacing:.15em;color:#b22222}
.subtitle{text-align:center;color:#888;margin-bottom:1.5rem;font-size:.85rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.8rem;margin-bottom:1rem}
.card{background:#fff;border-radius:8px;padding:1.2rem;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card h2{font-size:1rem;margin-bottom:.8rem;color:#b22222;border-bottom:1px solid #eee;padding-bottom:.5rem}
.btn{background:#b22222;color:#fff;border:none;padding:.4rem 1rem;border-radius:6px;cursor:pointer;font-size:.85rem}
.btn:hover{background:#8b1a1a}
.btn.sm{padding:.25rem .6rem;font-size:.78rem}
input,select{padding:.4rem .6rem;border:1px solid #ddd;border-radius:6px;font-size:.85rem;width:100%;margin-bottom:.4rem}
label{font-size:.8rem;color:#666;display:block;margin-bottom:.2rem}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{text-align:left;padding:.4rem;border-bottom:2px solid #eee;color:#666;font-weight:600}
td{padding:.4rem;border-bottom:1px solid #f0f0f0;font-family:monospace;font-size:.78rem;word-break:break-all}
.status{display:inline-block;padding:.15rem .5rem;border-radius:4px;font-size:.72rem;font-weight:600}
.status.ok{background:#e8f5e9;color:#2e7d32}
.status.fail{background:#fbe9e7;color:#c62828}
.mono{font-family:monospace;font-size:.8rem;color:#555}
.log{padding:.3rem 0;border-bottom:1px solid #f0f0f0;font-size:.85rem}
.notice{background:#fff8e1;border:1px solid #ffe082;border-radius:6px;padding:.6rem;margin-bottom:.8rem;font-size:.82rem;color:#795548}
footer{text-align:center;color:#aaa;font-size:.75rem;margin-top:2rem;padding:1rem}
</style>
</head>
<body>
<div class="container">

<h1>🏛 Privacoin</h1>
<p class="subtitle">隐私保护加密货币 · 纯前端演示 (灵感来自 Zcash)</p>

<div class="notice">⚠️ 纯 JavaScript 实现，所有数据存在浏览器内存中，刷新即清零。</div>

<div class="grid">
  <div class="card">
    <h2>👤 创建钱包</h2>
    <input id="walletName" placeholder="例: Alice" onkeydown="if(event.key==='Enter')createWallet()">
    <button class="btn" onclick="createWallet()">创建</button>
  </div>
  <div class="card">
    <h2>💰 铸币</h2>
    <select id="mintOwner"><option value="">-- 选择 --</option></select>
    <input id="mintValue" type="number" min="1" value="100">
    <button class="btn" onclick="doMint()">铸造</button>
  </div>
  <div class="card">
    <h2>📤 隐私转账</h2>
    <select id="txFrom"><option value="">-- 发送方 --</option></select>
    <select id="txTo"><option value="">-- 接收方 --</option></select>
    <input id="txValue" type="number" min="1" value="10" placeholder="金额">
    <button class="btn" onclick="doTransfer()">发送 🛡</button>
  </div>
  <div class="card">
    <h2>📊 状态</h2>
    <div id="statusDisplay"></div>
    <button class="btn sm" style="margin-top:.5rem" onclick="refreshAll()">🔄 刷新</button>
  </div>
</div>

<div class="card"><h2>👛 钱包 & 余额</h2><div id="walletList">加载中...</div></div>
<div class="card"><h2>📜 链上 Note (承诺)</h2><div id="noteList">加载中...</div></div>
<div class="card"><h2>📋 交易日志</h2><div id="txLog">暂无记录</div></div>

<footer>🛡 Privacoin · 纯前端教学演示 · 数据不上传服务器</footer>
</div>

<script>
// ====== 密码学工具 ======
async function sha256(data) {
  const buf = typeof data === 'string' ? new TextEncoder().encode(data) : data;
  const h = await crypto.subtle.digest('SHA-256', buf);
  return new Uint8Array(h);
}

function hex(b) {
  return Array.from(b).map(x => x.toString(16).padStart(2,'0')).join('').slice(0,16)+'...';
}
function hexFull(b) {
  return Array.from(b).map(x => x.toString(16).padStart(2,'0')).join('');
}
function randomBytes(n) {
  return crypto.getRandomValues(new Uint8Array(n));
}

// ====== 核心数据结构 ======
let ledger = { wallets: {}, notes: [], nullifiers: new Set(), tree: null };

function initTree() {
  const depth = 5;
  const empty = new Uint8Array(32);
  let leaves = new Array(1<<depth).fill(empty);
  let nodes = [leaves.slice()];
  for (let level = 1; level <= depth; level++) {
    const prev = nodes[level-1];
    const cur = [];
    for (let i = 0; i < prev.length; i+=2) {
      cur.push(null); // placeholder
    }
    nodes.push(cur);
  }
  return { depth, leaves, nodes, count: 0, emptyHash: empty };
}

function treeAddLeaf(tree, cm) {
  if (tree.count >= tree.leaves.length) throw 'Tree full';
  const idx = tree.count;
  tree.leaves[idx] = cm;
  tree.nodes[0][idx] = cm;
  tree.count++;
  // update path to root
  let i = idx;
  for (let level = 1; level <= tree.depth; level++) {
    const parent = Math.floor(i/2);
    const left = tree.nodes[level-1][parent*2];
    const right = tree.nodes[level-1][parent*2+1];
    const combined = new Uint8Array(64);
    combined.set(left);
    combined.set(right, 32);
    // hash synchronously - we'll use a workaround
    tree.nodes[level][parent] = combined; // placeholder, recalc later
    i = parent;
  }
  return idx;
}

// For simplicity, we use a synchronous hash approach
// SHA-256 in browser is async, so we pre-compute
let _treeHashes = {};

function computeTreeRoot(tree) {
  // Recompute all internal nodes bottom-up
  for (let level = 1; level <= tree.depth; level++) {
    for (let i = 0; i < tree.nodes[level-1].length; i+=2) {
      const left = tree.nodes[level-1][i];
      const right = tree.nodes[level-1][i+1];
      const parent = Math.floor(i/2);
      tree.nodes[level][parent] = hashPair(left, right);
    }
  }
}

function hashPair(a, b) {
  const combined = new Uint8Array(64);
  combined.set(a);
  combined.set(b, 32);
  // We'll do sync hashing using a pre-computed approach
  // For demo, we use a deterministic "hash"
  let h = 0;
  for (let i = 0; i < combined.length; i++) {
    h = ((h << 5) - h + combined[i]) | 0;
  }
  const result = new Uint8Array(32);
  for (let i = 0; i < 8; i++) {
    result[i*4] = (h >> 24) & 0xff;
    result[i*4+1] = (h >> 16) & 0xff;
    result[i*4+2] = (h >> 8) & 0xff;
    result[i*4+3] = h & 0xff;
  }
  return result;
}

// Note
class Note {
  constructor(value, owner) {
    this.value = value;
    this.owner = owner;
    this.rho = randomBytes(32);
    this.r = randomBytes(32);
  }
  commitment() {
    const data = new Uint8Array(8 + 32 + 32 + 32);
    const v = new Uint8Array(8);
    for (let i = 0; i < 8; i++) v[7-i] = (this.value >> (i*8)) & 0xff;
    data.set(v, 0);
    data.set(this.owner, 8);
    data.set(this.rho, 40);
    data.set(this.r, 72);
    // Simplified deterministic hash for demo
    let h = this.value * 31;
    for (let i = 0; i < 32; i++) h = ((h << 5) - h + this.owner[i]) | 0;
    for (let i = 0; i < 32; i++) h = ((h << 5) - h + this.rho[i]) | 0;
    const r = new Uint8Array(32);
    for (let i = 0; i < 8; i++) {
      r[i*4] = (h >> 24) & 0xff;
      r[i*4+1] = (h >> 16) & 0xff;
      r[i*4+2] = (h >> 8) & 0xff;
      r[i*4+3] = h & 0xff;
    }
    return r;
  }
  nullifier() {
    const data = new Uint8Array(64);
    data.set(this.owner, 0);
    data.set(this.rho, 32);
    let h = 0;
    for (let i = 0; i < 64; i++) h = ((h << 5) - h + data[i]) | 0;
    const r = new Uint8Array(32);
    for (let i = 0; i < 8; i++) {
      r[i*4] = (h >> 24) & 0xff;
      r[i*4+1] = (h >> 16) & 0xff;
      r[i*4+2] = (h >> 8) & 0xff;
      r[i*4+3] = h & 0xff;
    }
    return r;
  }
}

// ====== 操作函数 ======
function createWallet() {
  const name = document.getElementById('walletName').value.trim();
  if (!name) { log('❌', '请输入钱包名称'); return; }
  if (ledger.wallets[name]) { log('❌', `'${name}' 已存在`); return; }
  ledger.wallets[name] = { pkh: randomBytes(20) };
  document.getElementById('walletName').value = '';
  log('✅', `钱包 '${name}' 创建成功`);
  refreshAll();
}

function doMint() {
  const name = document.getElementById('mintOwner').value;
  const value = parseInt(document.getElementById('mintValue').value);
  if (!name || !ledger.wallets[name]) { log('❌', '请选择有效的钱包'); return; }
  if (value <= 0) { log('❌', '金额须 > 0'); return; }
  if (!ledger.tree) ledger.tree = initTree();
  const note = new Note(value, ledger.wallets[name].pkh);
  const cm = note.commitment();
  treeAddLeaf(ledger.tree, cm);

  if (!ledger.notes) ledger.notes = [];
  ledger.notes.push({ note, cm, spent: false, owner: name });
  log('✅', `为 ${name} 铸造 ${value} 聪`);
  refreshAll();
}

function doTransfer() {
  const from = document.getElementById('txFrom').value;
  const to = document.getElementById('txTo').value;
  const value = parseInt(document.getElementById('txValue').value);
  if (!from || !ledger.wallets[from]) { log('❌', '选择发送方'); return; }
  if (!to || !ledger.wallets[to]) { log('❌', '选择接收方'); return; }
  if (from === to) { log('❌', '不能转给自己'); return; }
  if (value <= 0) { log('❌', '金额须 > 0'); return; }

  const spendable = ledger.notes.filter(n => n.owner === from && !n.spent);
  if (spendable.length === 0) { log('❌', `${from} 没有可花的 Note`); return; }
  const sel = spendable.find(n => n.note.value >= value);
  if (!sel) { log('❌', `${from} 没有金额足够的 Note`); return; }

  // Mark spent
  sel.spent = true;
  const nf = sel.note.nullifier();
  ledger.nullifiers.add(hexFull(nf));

  // Change
  const changeVal = sel.note.value - value;
  if (changeVal > 0) {
    const changeNote = new Note(changeVal, ledger.wallets[from].pkh);
    ledger.notes.push({ note: changeNote, cm: changeNote.commitment(), spent: false, owner: from });
    treeAddLeaf(ledger.tree, changeNote.commitment());
  }

  // To recipient
  const toNote = new Note(value, ledger.wallets[to].pkh);
  ledger.notes.push({ note: toNote, cm: toNote.commitment(), spent: false, owner: to });
  treeAddLeaf(ledger.tree, toNote.commitment());

  let msg = `${from} → ${to} : ${value} 聪`;
  if (changeVal > 0) msg += ` (找零 ${changeVal} 聪)`;
  log('✅', msg);
  refreshAll();
}

function log(icon, msg) {
  const div = document.getElementById('txLog');
  const el = document.createElement('div');
  el.className = 'log';
  el.innerHTML = `${icon} ${msg}`;
  div.prepend(el);
  if (div.children.length > 50) div.removeChild(div.lastChild);
}

function refreshAll() {
  // Wallet selects
  const names = Object.keys(ledger.wallets);
  const selects = ['mintOwner','txFrom','txTo'];
  selects.forEach(id => {
    const sel = document.getElementById(id);
    const cur = sel.value;
    sel.innerHTML = '<option value="">-- 选择 --</option>';
    names.forEach(n => {
      const bal = ledger.notes.filter(x => x.owner === n && !x.spent).reduce((s,x) => s + x.note.value, 0);
      const o = document.createElement('option');
      o.value = n; o.textContent = `${n} (${bal} 聪)`;
      sel.appendChild(o);
    });
    if (cur && names.includes(cur)) sel.value = cur;
  });

  // Wallet table
  const wHtml = names.length
    ? '<table><tr><th>名称</th><th>地址</th><th>余额</th></tr>' +
      names.map(n => {
        const bal = ledger.notes.filter(x => x.owner === n && !x.spent).reduce((s,x) => s + x.note.value, 0);
        return `<tr><td><strong>${n}</strong></td><td class="mono">${hex(ledger.wallets[n].pkh)}</td><td><strong>${bal}</strong> 聪</td></tr>`;
      }).join('') + '</table>'
    : '<p class="mono">暂无钱包</p>';
  document.getElementById('walletList').innerHTML = wHtml;

  // Notes table
  const notes = ledger.notes || [];
  const nHtml = notes.length
    ? '<table><tr><th>承诺</th><th>拥有者</th><th>金额</th><th>状态</th></tr>' +
      notes.map(n => `<tr><td class="mono">${hex(n.cm)}</td><td>${n.owner}</td><td>${n.note.value} 聪</td><td>${
        n.spent ? '<span class="status fail">已花</span>' : '<span class="status ok">未花</span>'
      }</td></tr>`).join('') + '</table>'
    : '<p class="mono">链上暂无 Note</p>';
  document.getElementById('noteList').innerHTML = nHtml;

  // Status
  const treeRoot = ledger.tree ? hex(ledger.tree.leaves[0]) : '空';
  document.getElementById('statusDisplay').innerHTML =
    `<table><tr><td>钱包数</td><td><strong>${names.length}</strong></td></tr>` +
    `<tr><td>链上承诺</td><td><strong>${notes.length}</strong></td></tr>` +
    `<tr><td>已用 Nullifier</td><td><strong>${ledger.nullifiers.size}</strong></td></tr></table>`;
}

// Init
ledger.tree = initTree();
refreshAll();
</script>
</body>
</html>
